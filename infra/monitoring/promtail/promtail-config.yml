server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          host: hetzner
          __path__: /host/var/log/*.log
      - targets:
          - localhost
        labels:
          job: system
          host: hetzner
          __path__: /host/var/log/messages
      - targets:
          - localhost
        labels:
          job: system
          host: hetzner
          __path__: /host/var/log/syslog
      - targets:
          - localhost
        labels:
          job: nginx
          host: hetzner
          __path__: /host/var/log/nginx/*.log

  - job_name: pm2-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: pm2
          host: hetzner
          __path__: /host/pm2/*.log

  - job_name: docker-json-logs
    pipeline_stages:
      - docker: {}
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: hetzner
          __path__: /host/docker/containers/*/*-json.log
